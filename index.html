<!DOCTYPE html>
<html>
<head>
<title>Shravan R Portfolio</title>

<style>

body{
background:linear-gradient(45deg,#000,#111,#000);
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

h1{
font-size:40px;
margin-top:30px;
}

.gallery{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
padding:30px;
}

.gallery img{
width:100%;
border-radius:15px;
cursor:pointer;
box-shadow:0 0 10px #00ffff;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

.viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

.viewer img{
max-width:90%;
max-height:70%;
}

.closeBtn{
position:absolute;
top:20px;
right:40px;
font-size:70px;
cursor:pointer;
}

/* INSTAGRAM STYLE ACTIONS */

.actions{
display:flex;
align-items:center;
gap:20px;
font-size:35px;
margin-top:20px;
}

.likeBtn{
cursor:pointer;
transition:.3s;
}

.likeBtn.liked{
color:red;
transform:scale(1.3);
}

/* COMMENT AREA */

.commentBox{
margin-top:20px;
}

.commentBox input{
padding:10px;
width:300px;
font-size:16px;
}

.commentBox button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

.commentList{
margin-top:15px;
max-height:200px;
overflow:auto;
width:350px;
text-align:left;
}

.comment{
background:#111;
padding:8px;
margin:5px;
border-radius:5px;
}

</style>
</head>

<body>

<h1>🔥 Shravan R Editing Portfolio 🔥</h1>

<h2>My Edits</h2>

<div class="gallery">

<img src="Advitha 1.jpg" onclick="openImg(this,'Advitha 1')">
<img src="Poster ..jpg" onclick="openImg(this,'Poster')">
<img src="Advitha 2.jpg" onclick="openImg(this,'Advitha 2')">
<img src="Advitha 3.jpg" onclick="openImg(this,'Advitha 3')">
<img src="Advitha 4.jpg" onclick="openImg(this,'Advitha 4')">
<img src="BMW.jpg" onclick="openImg(this,'BMW Edit')">
<img src="CC BEND ITT.jpg" onclick="openImg(this,'CC BEND')">
<img src="Card.jpg" onclick="openImg(this,'Card Design')">
<img src="Janna Ortega.jpg" onclick="openImg(this,'Jenna Ortega')">
<img src="Leonor queen.jpg" onclick="openImg(this,'Leonor Queen')">
<img src="Manish R.jpg" onclick="openImg(this,'Manish R')">
<img src="Modi ji.jpg" onclick="openImg(this,'Modi Ji')">
<img src="Pooja Maa.jpg" onclick="openImg(this,'Pooja Maa')">
<img src="Prabash.jpg" onclick="openImg(this,'Prabhas')">
<img src="Posters.jpg" onclick="openImg(this,'Posters')">
<img src="SAMANTA.jpg" onclick="openImg(this,'Samanta')">
<img src="Sunil Anna .jpg" onclick="openImg(this,'Sunil Anna')">
<img src="Travel poster.jpg" onclick="openImg(this,'Travel Poster')">
<img src="invet poster..... 1 copy.jpg" onclick="openImg(this,'Invite Poster')">
<img src="tamnail ..jpg" onclick="openImg(this,'Thumbnail')">
<img src="text disegn 2.jpg" onclick="openImg(this,'Text Design')">

</div>

<div class="viewer" id="viewer">

<div class="closeBtn" onclick="closeImg()">×</div>

<img id="fullImg">

<h2 id="photoName"></h2>

<div class="actions">

<span id="likeBtn" class="likeBtn" onclick="likePhoto()">❤️</span>
<span id="likeCount">0</span>

<span>💬</span>
<span id="commentCount">0</span>

</div>

<div class="commentBox">

<input id="commentInput" placeholder="Write comment">

<button onclick="addComment()">Send</button>

</div>

<div id="commentList" class="commentList"></div>

</div>

<script>

let likeCount=0
let commentCount=0

function openImg(img,name){

viewer.style.display="flex"
fullImg.src=img.src
photoName.innerText=name

}

function closeImg(){

viewer.style.display="none"

}

function likePhoto(){

let btn=document.getElementById("likeBtn")

if(!btn.classList.contains("liked")){

likeCount++
likeCountText=document.getElementById("likeCount")
likeCountText.innerText=likeCount

btn.classList.add("liked")

}

}

function addComment(){

let text=document.getElementById("commentInput").value

if(text=="") return

let div=document.createElement("div")
div.className="comment"
div.innerText=text

document.getElementById("commentList").appendChild(div)

commentCount++

document.getElementById("commentCount").innerText=commentCount

document.getElementById("commentInput").value=""

}

</script>

</body>
</html>
