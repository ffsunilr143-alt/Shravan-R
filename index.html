<!DOCTYPE html>
<html>
<head>
<title>Shravan R Portfolio</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(45deg,#000,#111,#000);
color:white;
text-align:center;
scroll-behavior:smooth;
}

h1{
font-size:45px;
margin-top:30px;
text-shadow:0 0 15px cyan;
}

.gallery{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
padding:30px;
}

.gallery img{
width:100%;
border-radius:15px;
cursor:pointer;
box-shadow:0 0 10px cyan;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.07);
box-shadow:0 0 25px cyan;
}

.viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
overflow-y:scroll;
scroll-snap-type:y mandatory;
z-index:999;
}

.closeBtn{
position:fixed;
top:20px;
right:30px;
font-size:60px;
cursor:pointer;
z-index:1000;
}

.post{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
scroll-snap-align:start;
}

.post img{
max-width:90vw;
max-height:65vh;
border-radius:15px;
box-shadow:0 0 20px cyan;
}

.postName{
font-size:60px;
font-weight:bold;
text-align:left;
width:90vw;
margin-top:20px;
text-shadow:0 0 15px cyan;
}

.actions{
display:flex;
align-items:center;
gap:40px;
width:90vw;
font-size:70px;
margin-top:15px;
}

.likeBtn{
cursor:pointer;
transition:.3s;
}

.likeBtn:hover{
transform:scale(1.3);
}

.likeBtn.liked{
color:#ff004f;
transform:scale(1.5);
text-shadow:0 0 15px red;
}

.commentBtn{
cursor:pointer;
transition:.3s;
}

.commentBtn:hover{
transform:scale(1.3);
}

.likeCount,
.commentCount{
font-size:28px;
font-weight:bold;
}

.commentBox{
margin-top:10px;
width:90vw;
}

.commentBox input{
padding:14px;
width:340px;
border-radius:10px;
border:none;
font-size:17px;
}

.commentList{
margin-top:10px;
max-height:140px;
overflow:auto;
width:400px;
text-align:left;
}

.comment{
background:#111;
padding:8px;
margin:6px;
border-radius:6px;
}

</style>
</head>

<body>

<h1>🔥 Shravan R Editing Portfolio 🔥</h1>
<h2>My Edits</h2>

<div class="gallery">

<img src="Advitha 1.jpg" onclick="openViewer()">
<img src="Poster ..jpg" onclick="openViewer()">
<img src="Advitha 2.jpg" onclick="openViewer()">
<img src="Advitha 3.jpg" onclick="openViewer()">
<img src="Advitha 4.jpg" onclick="openViewer()">
<img src="BMW.jpg" onclick="openViewer()">
<img src="CC BEND ITT.jpg" onclick="openViewer()">
<img src="Card.jpg" onclick="openViewer()">
<img src="Janna Ortega.jpg" onclick="openViewer()">
<img src="Leonor queen.jpg" onclick="openViewer()">
<img src="Manish R.jpg" onclick="openViewer()">
<img src="Modi ji.jpg" onclick="openViewer()">
<img src="Pooja Maa.jpg" onclick="openViewer()">
<img src="Prabash.jpg" onclick="openViewer()">
<img src="Posters.jpg" onclick="openViewer()">
<img src="SAMANTA.jpg" onclick="openViewer()">
<img src="Sunil Anna .jpg" onclick="openViewer()">
<img src="Travel poster.jpg" onclick="openViewer()">
<img src="invet poster..... 1 copy.jpg" onclick="openViewer()">
<img src="tamnail ..jpg" onclick="openViewer()">
<img src="text disegn 2.jpg" onclick="openViewer()">

</div>

<div class="viewer" id="viewer">

<div class="closeBtn" onclick="closeViewer()">×</div>

<div class="post">
<img src="Advitha 1.jpg">
<div class="postName">ADVITHA EDIT</div>

<div class="actions">
<span class="likeBtn" onclick="like(this)">❤️</span>
<span class="likeCount">0</span>

<span class="commentBtn" onclick="focusComment(this)">💬</span>
<span class="commentCount">0</span>
</div>

<div class="commentBox">
<input placeholder="Write comment..." onkeypress="sendComment(event,this)">
<div class="commentList"></div>
</div>

</div>

</div>

<script>

function openViewer(){
document.getElementById("viewer").style.display="block"
}

function closeViewer(){
document.getElementById("viewer").style.display="none"
}

function like(btn){

let post = btn.closest(".post")
let count = post.querySelector(".likeCount")

if(!btn.classList.contains("liked")){
btn.classList.add("liked")

let num=parseInt(count.innerText)
count.innerText=num+1
}

}

function focusComment(btn){
let post=btn.closest(".post")
let input=post.querySelector("input")
input.focus()
}

function sendComment(e,input){

if(e.key==="Enter"){

let text=input.value.trim()

if(text!==""){

let post=input.closest(".post")

let list=post.querySelector(".commentList")
let count=post.querySelector(".commentCount")

let div=document.createElement("div")
div.className="comment"
div.innerText=text

list.appendChild(div)

input.value=""

let num=parseInt(count.innerText)
count.innerText=num+1

}

}

}

</script>

</body>
</html>
