<!DOCTYPE html>
<html>
<head>
<title>Shravan R Portfolio</title>

<style>

body{
background:linear-gradient(45deg,#000,#111,#000);
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

h1{
font-size:40px;
margin-top:30px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px #fff;}
to{ text-shadow:0 0 25px #00ffff;}
}

.gallery{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
padding:30px;
}

.gallery img{
width:100%;
border-radius:15px;
cursor:pointer;
transition:0.4s;
box-shadow:0 0 10px #00ffff;
}

.gallery img:hover{
transform:scale(1.05);
}

/* FULL SCREEN VIEWER */

.viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:999;
flex-direction:column;
justify-content:center;
align-items:center;
}

.viewer img{
max-width:90%;
max-height:70%;
}

/* BIG CLOSE BUTTON */

.closeBtn{
position:absolute;
top:20px;
right:40px;
font-size:60px;
cursor:pointer;
}

/* PHOTO NAME */

.photoName{
font-size:28px;
margin-top:15px;
font-family:cursive;
letter-spacing:2px;
}

/* LIKE COMMENT AREA */

.actions{
margin-top:15px;
font-size:22px;
}

.actions span{
margin:0 15px;
cursor:pointer;
}

/* COMMENT BOX */

.commentBox{
margin-top:15px;
}

.commentBox input{
padding:8px;
width:250px;
}

.commentList{
margin-top:10px;
max-height:150px;
overflow:auto;
}

.comment{
background:#111;
padding:5px;
margin:5px;
border-radius:5px;
}

footer{
margin-top:40px;
padding:20px;
background:#000;
}

</style>
</head>

<body>

<h1>🔥 Shravan R Editing Portfolio 🔥</h1>

<p>I am a Professional Video Editor</p>

<h2>My Edits</h2>

<div class="gallery">

<img src="Advitha 1.jpg" onclick="openImg(this,'Advitha 1')">
<img src="Poster ..jpg" onclick="openImg(this,'Poster')">
<img src="Advitha 2.jpg" onclick="openImg(this,'Advitha 2')">
<img src="Advitha 3.jpg" onclick="openImg(this,'Advitha 3')">

<img src="Advitha 4.jpg" onclick="openImg(this,'Advitha 4')">
<img src="BMW.jpg" onclick="openImg(this,'BMW Edit')">
<img src="CC BEND ITT.jpg" onclick="openImg(this,'CC BEND')">
<img src="Card.jpg" onclick="openImg(this,'Card Design')">

</div>


<!-- FULLSCREEN -->

<div class="viewer" id="viewer">

<div class="closeBtn" onclick="closeImg()">×</div>

<img id="fullImg">

<div class="photoName" id="photoName"></div>

<div class="actions">
<span onclick="likePhoto()">❤️</span>
<span id="likeCount">0</span>

<span>💬</span>
<span id="commentCount">0</span>
</div>

<div class="commentBox">

<input type="text" id="commentInput" placeholder="Write comment...">

<button onclick="addComment()">Send</button>

</div>

<div class="commentList" id="commentList"></div>

</div>

<footer>
<p>© 2026 Shravan R</p>
</footer>

<script>

let liked=false
let likeCount=0
let commentCount=0

function openImg(img,name){

document.getElementById("viewer").style.display="flex"
document.getElementById("fullImg").src=img.src
document.getElementById("photoName").innerText=name

}

function closeImg(){
document.getElementById("viewer").style.display="none"
}

function likePhoto(){

if(!liked){

likeCount++

document.getElementById("likeCount").innerText=likeCount

liked=true

}

}

function addComment(){

let input=document.getElementById("commentInput")

let text=input.value

if(text=="") return

let div=document.createElement("div")

div.className="comment"

div.innerText=text

document.getElementById("commentList").appendChild(div)

commentCount++

document.getElementById("commentCount").innerText=commentCount

input.value=""

}

</script>

</body>
</html>
