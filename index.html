<!DOCTYPE html>
<html>
<head>
<title>Shravan R Portfolio</title>

<style>

body{
background:linear-gradient(45deg,#000000,#111111,#000000);
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

h1{
font-size:40px;
margin-top:30px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px #fff;}
to{ text-shadow:0 0 25px #00ffff;}
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:30px;
}

.gallery img{
max-width:300px;
height:auto;
border-radius:15px;
transition:0.4s;
box-shadow:0 0 10px #00ffff;
cursor:pointer;
}

.gallery img:hover{
transform:scale(1.05);
box-shadow:0 0 25px #00ffff;
}

/* Fullscreen viewer */

.viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:999;
}

.viewer img{
max-width:95%;
max-height:95%;
}

.viewer span{
position:absolute;
top:20px;
right:40px;
font-size:40px;
cursor:pointer;
color:white;
}

footer{
margin-top:40px;
padding:20px;
background:#000;
}

</style>
</head>

<body>

<h1>🔥 Shravan R Editing Portfolio 🔥</h1>
<p>I am a Professional Video Editor</p>

<h2>My Edits</h2>

<div class="gallery">

<img src="Advitha 1.jpg" onclick="openImg(this)">
<img src="Poster ..jpg" onclick="openImg(this)">
<img src="Advitha 2.jpg" onclick="openImg(this)">
<img src="Advitha 3.jpg" onclick="openImg(this)">
<img src="Advitha 4.jpg" onclick="openImg(this)">
<img src="BMW.jpg" onclick="openImg(this)">
<img src="CC BEND ITT.jpg" onclick="openImg(this)">
<img src="Card.jpg" onclick="openImg(this)">
<img src="Janna Ortega.jpg" onclick="openImg(this)">
<img src="Leonor queen.jpg" onclick="openImg(this)">
<img src="Manish R.jpg" onclick="openImg(this)">
<img src="Modi ji.jpg" onclick="openImg(this)">
<img src="Pooja Maa.jpg" onclick="openImg(this)">
<img src="Prabash.jpg" onclick="openImg(this)">
<img src="Posters.jpg" onclick="openImg(this)">
<img src="SAMANTA.jpg" onclick="openImg(this)">
<img src="Sunil Anna .jpg" onclick="openImg(this)">
<img src="Travel poster.jpg" onclick="openImg(this)">
<img src="invet poster..... 1 copy.jpg" onclick="openImg(this)">
<img src="tamnail ..jpg" onclick="openImg(this)">
<img src="text disegn 2.jpg" onclick="openImg(this)">

</div>

<!-- Fullscreen Image Viewer -->

<div class="viewer" id="viewer">
<span onclick="closeImg()">×</span>
<img id="fullImg">
</div>

<footer>
<p>© 2026 Shravan R</p>
</footer>

<script>

function openImg(img){
document.getElementById("viewer").style.display="flex";
document.getElementById("fullImg").src=img.src;
}

function closeImg(){
document.getElementById("viewer").style.display="none";
}

</script>

</body>
</html>
