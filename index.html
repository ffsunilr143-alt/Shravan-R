<!DOCTYPE html>

<title>Shravan R Portfolio</title>

<style>

body{
background:linear-gradient(45deg,#000,#111,#000);
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

h1{
font-size:40px;
margin-top:30px;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
padding:30px;
}

.gallery img{
width:100%;
border-radius:15px;
cursor:pointer;
box-shadow:0 0 10px #00ffff;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* VIEWER */

.viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
overflow-y:scroll;
scroll-snap-type:y mandatory;
z-index:999;
}

/* POST */

.post{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
scroll-snap-align:start;
}

.post img{
max-width:90vw;
max-height:65vh;
}

/* CLOSE BUTTON */

.closeBtn{
position:fixed;
top:20px;
right:30px;
font-size:60px;
cursor:pointer;
z-index:1000;
}

/* ACTIONS */

.actions{
display:flex;
justify-content:space-between;
align-items:center;
width:90vw;
font-size:40px;
margin-top:15px;
}

.likeBtn{
cursor:pointer;
transition:.3s;
}

.likeBtn.liked{
color:red;
transform:scale(1.3);
}

/* COMMENTS */

.commentBox{
margin-top:10px;
}

.commentBox input{
padding:10px;
width:300px;
}

.commentList{
margin-top:10px;
max-height:150px;
overflow:auto;
width:350px;
text-align:left;
}

.comment{
background:#111;
padding:5px;
margin:5px;
border-radius:5px;
}

</style>
</head>
